<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* کسٹم کیمرا ویریبرل فونٹس */
        @font-face {
            font-family: 'CameraPlainVariable';
            src: url('https://cdn.gpteng.co/mcp-widgets/v1/fonts/CameraPlainVariable.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        /* ٹوسٹ الرٹس (Sonner Core Animation Infrastructure) */
        :where(html[dir="ltr"]), :where([data-sonner-toaster][dir="ltr"]) {
            --toast-icon-margin-start: -3px; --toast-icon-margin-end: 4px; --toast-svg-margin-start: -1px; --toast-svg-margin-end: 0px; --toast-button-margin-start: auto; --toast-button-margin-end: 0; --toast-close-button-start: 0; --toast-close-button-end: unset; --toast-close-button-transform: translate(-35%, -35%)
        }
        :where([data-sonner-toaster]) {
            position: fixed; width: var(--width); font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; --gray1: hsl(0, 0%, 99%); --gray2: hsl(0, 0%, 97.3%); --gray3: hsl(0, 0%, 95.1%); --gray4: hsl(0, 0%, 93%); --gray5: hsl(0, 0%, 90.9%); --gray6: hsl(0, 0%, 88.7%); --gray7: hsl(0, 0%, 85.8%); --gray8: hsl(0, 0%, 78%); --gray9: hsl(0, 0%, 56.1%); --gray10: hsl(0, 0%, 52.3%); --gray11: hsl(0, 0%, 43.5%); --gray12: hsl(0, 0%, 9%); --border-radius: 8px; box-sizing: border-box; padding: 0; margin: 0; list-style: none; outline: none; z-index: 999999999
        }
        [data-sonner-toaster][data-sonner-theme=dark] {
            --normal-bg: #000; --normal-bg-hover: hsl(0, 0%, 12%); --normal-border: hsl(0, 0%, 20%); --normal-border-hover: hsl(0, 0%, 25%); --normal-text: var(--gray1); --success-bg: hsl(150, 100%, 6%); --success-border: hsl(147, 100%, 12%); --success-text: hsl(150, 86%, 65%); --info-bg: hsl(215, 100%, 6%); --info-border: hsl(223, 43%, 17%); --info-text: hsl(216, 87%, 65%); --error-bg: hsl(358, 76%, 10%); --error-border: hsl(357, 89%, 16%); --error-text: hsl(358, 100%, 81%)
        }

        /* کلاؤڈ اینیمیشنز اور لوڈر اسپیڈ آپٹیمائزیشن */
        .sonner-loading-wrapper { --size: 16px; height: var(--size); width: var(--size); position: absolute; inset: 0; z-index: 10 }
        .sonner-spinner { position: relative; top: 50%; left: 50%; height: var(--size); width: var(--size) }
        .sonner-loading-bar { animation: sonner-spin 1.2s linear infinite; background: var(--gray11); border-radius: 6px; height: 8%; left: -10%; position: absolute; top: -3.9%; width: 24% }

        @keyframes sonner-fade-in { 0% { opacity: 0; transform: scale(.8) } to { opacity: 1; transform: scale(1) } }
        @keyframes sonner-fade-out { 0% { opacity: 1; transform: scale(1) } to { opacity: 0; transform: scale(.8) } }
        @keyframes sonner-spin { 0% { opacity: 1 } to { opacity: .15 } }

        /* پبلک واٹرمارک اور Lovable بیج کو ہٹانے کا مستقل ہیک */
        #lovable-badge, .lovable-badge, [id*="lovable"], [class*="lovable"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
            width: 0px !important;
            height: 0px !important;
        }
    </style>

</head>

</html>
